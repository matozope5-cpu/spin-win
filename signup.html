<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sign Up · MultiWin</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- SweetAlert -->
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.3/dist/sweetalert2.min.css" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0b0d17, #1a1f2e);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .signup-card {
            background: rgba(18, 22, 36, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 28px;
            padding: 28px 22px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .logo i {
            font-size: 2rem;
            color: #f1c40f;
        }

        .logo span {
            font-weight: 800;
            font-size: 1.5rem;
            color: white;
        }

        .logo .accent {
            color: #f1c40f;
        }

        h2 {
            color: white;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .subtitle {
            color: #a0aec0;
            font-size: 0.85rem;
        }

        .bonus-badge {
            background: rgba(241, 196, 15, 0.15);
            border: 1px solid rgba(241, 196, 15, 0.3);
            border-radius: 30px;
            padding: 8px 16px;
            display: inline-block;
            margin: 15px 0 5px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #f1c40f;
        }

        .form-group {
            margin-bottom: 18px;
            position: relative;
        }

        .form-control {
            width: 100%;
            padding: 16px 16px;
            background: #01040e;
            border: 1px solid #2a324a;
            border-radius: 16px;
            font-size: 0.95rem;
            color: white;
            transition: all 0.2s;
        }

        .form-control:focus {
            outline: none;
            border-color: #f1c40f;
            box-shadow: 0 0 0 2px rgba(241, 196, 15, 0.1);
        }

        .form-control::placeholder {
            color: #4a5568;
            font-size: 0.9rem;
        }

        .btn-signup {
            width: 100%;
            padding: 16px;
            background: linear-gradient(90deg, #f1c40f, #e67e22);
            border: none;
            border-radius: 40px;
            color: #0b0d17;
            font-size: 1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: transform 0.1s;
            margin-top: 8px;
            box-shadow: 0 6px 15px rgba(241, 196, 15, 0.3);
        }

        .btn-signup:active {
            transform: scale(0.98);
        }

        .trust-badges {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin: 20px 0 12px;
        }

        .trust-badge {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            padding: 8px 6px;
            font-size: 0.65rem;
            color: #a0aec0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .trust-badge i {
            color: #f1c40f;
            font-size: 0.7rem;
        }

        .login-link {
            text-align: center;
            margin-top: 16px;
            font-size: 0.8rem;
            color: #a0aec0;
        }

        .login-link a {
            color: #f1c40f;
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 16px;
        }

        .loading-popup {
            background: #1a1f2e;
            border-radius: 24px;
            padding: 30px 24px;
            text-align: center;
            max-width: 280px;
            width: 100%;
            border: 1px solid rgba(241, 196, 15, 0.2);
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(241, 196, 15, 0.1);
            border-radius: 50%;
            border-top: 4px solid #f1c40f;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 1rem;
            color: white;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .loading-subtext {
            font-size: 0.8rem;
            color: #a0aec0;
        }

        /* Small screen adjustments */
        @media (max-width: 360px) {
            .signup-card {
                padding: 22px 18px;
            }
            
            h2 {
                font-size: 1.3rem;
            }
            
            .form-control {
                padding: 14px;
            }
            
            .btn-signup {
                padding: 14px;
            }
            
            .trust-badge {
                font-size: 0.6rem;
                padding: 6px 4px;
            }
        }
    </style>
</head>
<body>

    <div class="signup-card">
        
        <div class="header">
            <div class="logo">
                <i class="fas fa-dharmachakra"></i>
                <span>MULTI<span class="accent">WIN</span></span>
            </div>
            <h2>Create Account</h2>
            <p class="subtitle">Get your KES 1,000 welcome bonus instantly</p>
            <div class="bonus-badge">
                <i class="fas fa-gift" style="margin-right: 4px;"></i> KES 1,000 FREE
            </div>
        </div>

        <form id="signupForm">
            
            <div class="form-group">
                <input type="text" class="form-control" id="name" placeholder="Full Name" required>
            </div>
            
            <div class="form-group">
                <input type="tel" class="form-control" id="phone" placeholder="Phone Number (e.g., 0712345678)" required>
            </div>
            
            <div class="form-group">
                <input type="number" class="form-control" id="idNumber" placeholder="ID Number" required>
            </div>

            <!-- Trust badges -->
            <div class="trust-badges">
                <div class="trust-badge">
                    <i class="fas fa-lock"></i> SSL Secured
                </div>
                <div class="trust-badge">
                    <i class="fas fa-shield-alt"></i> Data Protected
                </div>
                <div class="trust-badge">
                    <i class="fas fa-bolt"></i> Instant Bonus
                </div>
                <div class="trust-badge">
                    <i class="fas fa-check-circle"></i> Licensed
                </div>
            </div>

            <button type="submit" class="btn-signup">
                <i class="fas fa-gift"></i> Sign Up & Get Bonus
            </button>
            
        </form>

    </div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-popup">
            <div class="loading-spinner"></div>
            <p class="loading-text">Creating Account</p>
            <p class="loading-subtext">Please wait while we set up your bonus...</p>
        </div>
    </div>

    <!-- SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.3/dist/sweetalert2.all.min.js"></script>

    <script>
        // Validation regex
        const nameRegex = /^[a-zA-Z\s.'-]{2,}$/;
        const phoneRegex = /^(?:\+?254|0)[17]\d{8}$/;
        const idRegex = /^\d{7,10}$/;

        const loadingOverlay = document.getElementById('loadingOverlay');

        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const id = document.getElementById('idNumber').value.trim();

            // Validation
            if (!nameRegex.test(name)) {
                Swal.fire({
                    icon: 'error',
                    title: 'Invalid Name',
                    text: 'Please enter your full name (letters only)',
                    confirmButtonColor: '#f1c40f'
                });
                return;
            }

            if (!phoneRegex.test(phone)) {
                Swal.fire({
                    icon: 'error',
                    title: 'Invalid Phone',
                    text: 'Please enter a valid Kenyan phone number (e.g., 0712345678)',
                    confirmButtonColor: '#f1c40f'
                });
                return;
            }

            if (!idRegex.test(id)) {
                Swal.fire({
                    icon: 'error',
                    title: 'Invalid ID',
                    text: 'Please enter a valid Kenyan ID (7-10 digits)',
                    confirmButtonColor: '#f1c40f'
                });
                return;
            }

            // Show loading overlay
            loadingOverlay.style.display = 'flex';

            // Store user data
            sessionStorage.setItem('multiwin_user', JSON.stringify({
                name: name,
                phone: phone,
                idNumber: id,
                bonus: 1000,
                joined: new Date().toISOString()
            }));

            // Set logged in flag
            localStorage.setItem('isLoggedIn', 'true');

            // Simulate account creation and redirect
            setTimeout(() => {
                loadingOverlay.style.display = 'none';
                
                Swal.fire({
                    icon: 'success',
                    title: 'Welcome to MultiWin!',
                    text: 'Your account has been created and KES 1,000 bonus added!',
                    timer: 2000,
                    showConfirmButton: false,
                    background: '#1a1f2e',
                    color: 'white',
                    iconColor: '#f1c40f'
                }).then(() => {
                    window.location.href = 'dashboard.html';
                });
            }, 2500);
        });

        // Hide loading overlay if user navigates back
        window.addEventListener('pageshow', function() {
            loadingOverlay.style.display = 'none';
        });
    </script>

</body>
</html>
